services:
  postgres:
    image: postgres:15-alpine
    container_name: liftoff_postgres
    environment:
      POSTGRES_DB: liftoff
      POSTGRES_USER: liftoff
      POSTGRES_PASSWORD: liftoff
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U liftoff -d liftoff']
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: liftoff_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s

  ngrok:
    image: ngrok/ngrok:latest
    container_name: liftoff_ngrok
    command: ['http', '--domain=aniya-preservable-harriett.ngrok-free.dev', 'api:4000']
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - '4040:4040'
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: development
    container_name: liftoff_api
    ports:
      - '4000:4000'
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/config:/app/packages/config
      - api_node_modules:/app/node_modules
      - api_apps_node_modules:/app/apps/api/node_modules
    env_file:
      - ./apps/api/.env
    environment:
      - DATABASE_URL=postgresql://liftoff:liftoff@postgres:5432/liftoff
      - REDIS_URL=redis://redis:6379
      - WEBHOOK_BASE_URL=https://aniya-preservable-harriett.ngrok-free.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: development
    container_name: liftoff_web
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/app:/app/apps/web/app
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/config:/app/packages/config
      - web_node_modules:/app/node_modules
      - web_apps_node_modules:/app/apps/web/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=http://localhost:4000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  api_apps_node_modules:
  web_node_modules:
  web_apps_node_modules:
