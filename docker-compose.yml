services:
  postgres:
    image: postgres:15-alpine
    container_name: liftoff_postgres
    environment:
      POSTGRES_DB: liftoff
      POSTGRES_USER: liftoff
      POSTGRES_PASSWORD: liftoff
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U liftoff -d liftoff']
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: liftoff_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s

  # ngrok is opt-in. Run on the host (`ngrok http 4000`) and set WEBHOOK_BASE_URL
  # in apps/api/.env. To use the containerised ngrok instead:
  #   1. Put NGROK_AUTHTOKEN + your reserved url in a .env next to this file
  #   2. Re-enable this service and pass --url=<your-domain>
  # ngrok:
  #   image: ngrok/ngrok:latest
  #   container_name: liftoff_ngrok
  #   command: ['http', '--url=<your-reserved-domain>', 'api:4000']
  #   environment:
  #     - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
  #   ports:
  #     - '4040:4040'
  #   depends_on:
  #     - api

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: development
    container_name: liftoff_api
    ports:
      - '4000:4000'
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/config:/app/packages/config
      # The infra runner spawns Pulumi as a subprocess and ts-node-compiles the
      # stack file fresh on every run, so the source must be live-mounted —
      # otherwise the container holds whatever was baked in at image-build time
      # and shape changes (e.g. the multi-service migration) cause Pulumi to
      # fail with TS2352 mismatches between the runner's args and the stale stack.
      - ./packages/pulumi-components/src:/app/packages/pulumi-components/src
      - api_node_modules:/app/node_modules
      - api_apps_node_modules:/app/apps/api/node_modules
    env_file:
      - ./apps/api/.env
    # These override .env so localhost/127.0.0.1 in apps/api/.env still works on the host.
    # WEBHOOK_BASE_URL is intentionally NOT overridden here — it must come from apps/api/.env
    # (set it to whatever public tunnel URL you're running, e.g. your ngrok URL).
    environment:
      - DATABASE_URL=postgresql://liftoff:liftoff@postgres:5432/liftoff
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: development
    container_name: liftoff_web
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/app:/app/apps/web/app
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/config:/app/packages/config
      - web_node_modules:/app/node_modules
      - web_apps_node_modules:/app/apps/web/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=http://localhost:4000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  api_apps_node_modules:
  web_node_modules:
  web_apps_node_modules:
