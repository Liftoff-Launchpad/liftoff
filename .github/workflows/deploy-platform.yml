name: Deploy Liftoff to Azure

# CI/CD for the Liftoff platform itself (not user deployments — those still go to
# DigitalOcean via Pulumi at runtime).
#
# Auth model: GitHub OIDC -> Azure user-assigned managed identity (federated
# credential). No service principal secret and no application secrets are stored
# in GitHub. All runtime secrets live in Azure Key Vault; the pipeline only ever
# swaps container image tags.
#
# Required GitHub Actions *variables* (Settings > Secrets and variables > Actions
# > Variables) — none are sensitive. Run scripts/azure/setup-github.ps1 to set them:
#   AZURE_CLIENT_ID        clientId of the user-assigned managed identity
#   AZURE_TENANT_ID        Entra tenant id
#   AZURE_SUBSCRIPTION_ID  subscription id
#   AZURE_RG               resource group (liftoff-rg)
#   ACR_NAME               container registry name (liftoffacr0413)
#   ACR_LOGIN_SERVER       e.g. liftoffacr0413.azurecr.io
#   ACA_DEFAULT_DOMAIN     Container Apps env default domain

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'Dockerfile.*'
      - 'infra/azure/**'
      - '.github/workflows/deploy-platform.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # apps/api imports runtime enums from '@prisma/client', which only exist
      # after `prisma generate`. Without this, tsc/jest fail on a clean runner.
      - name: Generate Prisma client
        run: pnpm --filter api db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  deploy:
    name: Build images & deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write   # required for OIDC token
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC -> managed identity)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # `az containerapp` lives in an extension not preinstalled on the runner.
      # Install it explicitly so the rollout doesn't depend on dynamic auto-install.
      - name: Ensure Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Compute image tags & public URLs
        id: vars
        run: |
          echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "api_url=https://liftoff-api.${{ vars.ACA_DEFAULT_DOMAIN }}" >> "$GITHUB_OUTPUT"
          echo "web_url=https://liftoff-web.${{ vars.ACA_DEFAULT_DOMAIN }}" >> "$GITHUB_OUTPUT"
          echo "github_url=${{ github.server_url }}/${{ github.repository }}" >> "$GITHUB_OUTPUT"

      # ACR Tasks (server-side `az acr build`) are not available on this
      # subscription tier, so images are built on the runner and pushed. The
      # managed identity's AcrPush role authorizes the docker login.
      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build & push API image
        run: |
          docker build -f Dockerfile.api \
            -t "${{ vars.ACR_LOGIN_SERVER }}/liftoff-api:${{ steps.vars.outputs.tag }}" \
            -t "${{ vars.ACR_LOGIN_SERVER }}/liftoff-api:latest" .
          docker push "${{ vars.ACR_LOGIN_SERVER }}/liftoff-api:${{ steps.vars.outputs.tag }}"
          docker push "${{ vars.ACR_LOGIN_SERVER }}/liftoff-api:latest"

      - name: Build & push web image
        run: |
          docker build -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.vars.outputs.api_url }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ steps.vars.outputs.api_url }} \
            -t "${{ vars.ACR_LOGIN_SERVER }}/liftoff-web:${{ steps.vars.outputs.tag }}" \
            -t "${{ vars.ACR_LOGIN_SERVER }}/liftoff-web:latest" .
          docker push "${{ vars.ACR_LOGIN_SERVER }}/liftoff-web:${{ steps.vars.outputs.tag }}"
          docker push "${{ vars.ACR_LOGIN_SERVER }}/liftoff-web:latest"

      - name: Build & push website image
        run: |
          docker build -f Dockerfile.website \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.vars.outputs.api_url }} \
            --build-arg NEXT_PUBLIC_APP_URL=${{ steps.vars.outputs.web_url }} \
            --build-arg NEXT_PUBLIC_GITHUB_URL=${{ steps.vars.outputs.github_url }} \
            -t "${{ vars.ACR_LOGIN_SERVER }}/liftoff-website:${{ steps.vars.outputs.tag }}" \
            -t "${{ vars.ACR_LOGIN_SERVER }}/liftoff-website:latest" .
          docker push "${{ vars.ACR_LOGIN_SERVER }}/liftoff-website:${{ steps.vars.outputs.tag }}"
          docker push "${{ vars.ACR_LOGIN_SERVER }}/liftoff-website:latest"

      - name: Roll out API
        run: |
          az containerapp update --name liftoff-api --resource-group "${{ vars.AZURE_RG }}" \
            --image "${{ vars.ACR_LOGIN_SERVER }}/liftoff-api:${{ steps.vars.outputs.tag }}"

      - name: Roll out web
        run: |
          az containerapp update --name liftoff-web --resource-group "${{ vars.AZURE_RG }}" \
            --image "${{ vars.ACR_LOGIN_SERVER }}/liftoff-web:${{ steps.vars.outputs.tag }}"

      - name: Roll out website
        run: |
          az containerapp update --name liftoff-website --resource-group "${{ vars.AZURE_RG }}" \
            --image "${{ vars.ACR_LOGIN_SERVER }}/liftoff-website:${{ steps.vars.outputs.tag }}"

      - name: Deployment summary
        run: |
          {
            echo "### Liftoff deployed to Azure :rocket:"
            echo ""
            echo "- API: ${{ steps.vars.outputs.api_url }}"
            echo "- Web: ${{ steps.vars.outputs.web_url }}"
            echo "- Image tag: \`${{ steps.vars.outputs.tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
